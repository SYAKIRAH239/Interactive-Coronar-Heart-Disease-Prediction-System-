{% extends "base.html" %}
{% block title %}Edit Profile — Heartfy{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Header -->
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('profile.view_profile') }}"
                   class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="fw-bold mb-0">Edit Profile</h4>
            </div>

            <div class="card p-4">
                <form method="POST" action="{{ url_for('profile.edit_profile') }}"
                      enctype="multipart/form-data">

                    <!-- Profile Image Upload -->
                    <div class="text-center mb-4">
                        <img id="imagePreview"
                             src="{{ url_for('static', filename='images/uploads/' + (doctor.profile_image or 'default_profile.png')) }}"
                             alt="Profile Preview"
                             class="rounded-circle mb-3"
                             style="width:110px; height:110px; object-fit:cover;
                                    border: 4px solid var(--primary-light);">
                        <div>
                            <label for="profile_image"
                                   class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-camera me-1"></i>Change Photo
                            </label>
                            <input type="file" id="profile_image" name="profile_image"
                                   accept="image/*" class="d-none"
                                   onchange="previewImage(event)"/>
                        </div>
                        <p class="text-muted" style="font-size:0.75rem; margin-top:6px;">
                            JPG or PNG, max 5MB
                        </p>
                    </div>

                    <hr class="mb-4"/>

                    <!-- Form Fields -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="full_name" class="form-control"
                                   placeholder="Dr. Ahmad bin Ali"
                                   value="{{ doctor.full_name or '' }}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="text" name="phone_number" class="form-control"
                                   placeholder="+60 12-345 6789"
                                   value="{{ doctor.phone_number or '' }}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Specialization</label>
                            <input type="text" name="specialization" class="form-control"
                                   placeholder="e.g. Cardiologist"
                                   value="{{ doctor.specialization or '' }}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Hospital / Clinic</label>
                            <input type="text" name="hospital" class="form-control"
                                   placeholder="e.g. Hospital Kuala Lumpur"
                                   value="{{ doctor.hospital or '' }}"/>
                        </div>
                    </div>

                    <!-- Read-only fields -->
                    <hr class="my-4"/>
                    <p class="text-muted small fw-semibold mb-3">ACCOUNT INFO (READ ONLY)</p>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control"
                                   value="{{ doctor.username }}" disabled/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control"
                                   value="{{ doctor.email }}" disabled/>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle me-2"></i>Save Changes
                        </button>
                        <a href="{{ url_for('profile.view_profile') }}"
                           class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('imagePreview').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
