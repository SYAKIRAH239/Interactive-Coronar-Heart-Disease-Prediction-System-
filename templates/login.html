{% extends "base.html" %}
{% block title %}Login — Heartfy{% endblock %}

{% block content %}
<div class="container py-5" style="min-height:90vh; display:flex; align-items:center;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="text-center mb-4">
                <i class="bi bi-heart-pulse-fill" style="font-size:2.5rem; color:var(--primary);"></i>
                <h4 class="fw-bold mt-2">Welcome Back</h4>
                <p class="text-muted small">Sign in to your Heartfy account</p>
            </div>

            <div class="card p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="Enter your username" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="loginPassword"
                                   class="form-control" placeholder="••••••••" required/>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('loginPassword', 'eyeIconLogin')">
                                <i class="bi bi-eye" id="eyeIconLogin"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>
            </div>

            <p class="text-center mt-3 text-muted small">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" style="color:var(--primary);">Register here</a>
            </p>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function togglePassword(fieldId, iconId) {
        const field = document.getElementById(fieldId);
        const icon  = document.getElementById(iconId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
{% endblock %}
